<!DOCTYPE html>
<html>
<head>
<title>Invitation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2 class="gold">Wedding Invitation</h2>

<p>
ഞങ്ങളുടെ വിവാഹ ചടങ്ങിലേക്ക് നിങ്ങളെയും കുടുംബത്തെയും
സ്നേഹപൂർവ്വം ക്ഷണിക്കുന്നു.
നിങ്ങളുടെ സാന്നിധ്യം ഞങ്ങളുടെ സന്തോഷത്തെ ഇരട്ടിയാക്കും.
</p>

<hr>

<h3>Will you attend?</h3>

<button onclick="yes()">Yes</button>
<button onclick="no()">No</button>

<div id="countBox" style="display:none;">
  <p>How many members?</p>

  <button onclick="decrease()">-</button>
  <span id="count">1</span>
  <button onclick="increase()">+</button>
</div>

<br><br>

<a href="location.html" class="btn">Next</a>

</div>

<script src="script.js"></script>

</body>
</html>
