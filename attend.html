<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Confirmation</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="hero">

    <div class="overlay"></div>

    <div class="form-card">

        <h2>
            Wedding Confirmation
        </h2>

        <form action="success.html">

            <div class="input-box">
                <label>Your Name</label>
                <input type="text" required>
            </div>

            <div class="input-box">
                <label>How Many Persons?</label>

                <select required>
                    <option>1 Person</option>
                    <option>2 Persons</option>
                    <option>3 Persons</option>
                    <option>4 Persons</option>
                    <option>5+ Persons</option>
                </select>
            </div>

            <div class="input-box">
                <label>Family Members</label>

                <textarea placeholder="Family member names..."></textarea>
            </div>

            <div class="input-box">
                <label>Location</label>

                <input type="text" required>
            </div>

            <div class="input-box">
                <label>Message For Couple</label>

                <textarea placeholder="Your wishes..."></textarea>
            </div>

            <button type="submit">
                CONFIRM ATTENDANCE
            </button>

        </form>

    </div>

</div>

</body>
</html>
