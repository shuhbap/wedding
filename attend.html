<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>RSVP Confirmation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#050505;
    overflow:hidden;
    color:white;
}

/* CUSTOM CURSOR */

.cursor{

    width:20px;
    height:20px;

    border:2px solid #ffcc4d;

    border-radius:50%;

    position:fixed;

    transform:translate(-50%,-50%);

    pointer-events:none;

    z-index:9999;

    box-shadow:0 0 20px #ffcc4d;
}

/* HERO */

.hero{

    width:100%;
    min-height:100vh;

    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

/* VIDEO BACKGROUND */

.bg-video{

    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-3;
}

.overlay{

    position:absolute;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.86));

    z-index:-2;
}

/* GOLD GLOW */

.hero::before{

    content:'';

    position:absolute;

    width:500px;
    height:500px;

    background:#ffcc4d18;

    border-radius:50%;

    top:-180px;
    left:-150px;

    filter:blur(120px);
}

.hero::after{

    content:'';

    position:absolute;

    width:450px;
    height:450px;

    background:#d89b0018;

    border-radius:50%;

    bottom:-180px;
    right:-120px;

    filter:blur(120px);
}

/* PARTICLES */

.particle{

    position:absolute;

    width:4px;
    height:4px;

    background:#ffcc4d;

    border-radius:50%;

    opacity:0.5;

    animation:float 10s linear infinite;
}

@keyframes float{

    0%{
        transform:translateY(100vh);
        opacity:0;
    }

    10%{
        opacity:0.7;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }

}

/* CARD */

.form-card{

    width:100%;
    max-width:720px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,204,77,0.15);

    backdrop-filter:blur(20px);

    border-radius:40px;

    padding:70px 50px;

    text-align:center;

    position:relative;

    z-index:2;

    box-shadow:
    0 0 60px rgba(255,204,77,0.07),
    inset 0 0 30px rgba(255,255,255,0.03);

    animation:fade 1.2s ease;
}

.form-card::before{

    content:'';

    position:absolute;

    inset:10px;

    border:1px solid rgba(255,204,77,0.08);

    border-radius:32px;

    pointer-events:none;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* TOP */

.decor{

    font-family:'Great Vibes',cursive;

    font-size:60px;

    color:#ffcc4d;

    margin-bottom:10px;
}

.top{

    color:#ffcc4d;

    letter-spacing:6px;

    font-size:12px;

    margin-bottom:25px;
}

/* TITLE */

h2{

    font-family:'Cinzel',serif;

    font-size:48px;

    line-height:1.4;

    margin-bottom:20px;
}

.desc{

    color:#d5d5d5;

    line-height:2;

    margin-bottom:45px;

    font-size:15px;
}

/* INPUT */

.input-box{

    text-align:left;

    margin-bottom:30px;
}

.input-box label{

    display:block;

    margin-bottom:12px;

    color:#ffcc4d;

    letter-spacing:2px;

    font-size:13px;
}

select{

    width:100%;

    padding:20px;

    border:none;

    outline:none;

    border-radius:20px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:15px;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,204,77,0.08);

    transition:0.4s;
}

select:focus{

    border:1px solid rgba(255,204,77,0.35);

    box-shadow:0 0 20px rgba(255,204,77,0.15);
}

select option{
    background:#111;
}

/* BUTTON */

button{

    width:100%;

    padding:19px;

    border:none;

    border-radius:60px;

    background:linear-gradient(135deg,#ffcc4d,#d89b00);

    color:black;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:0.5s;

    margin-top:10px;

    box-shadow:0 10px 30px rgba(255,204,77,0.3);
}

button:hover{

    transform:translateY(-5px);

    box-shadow:0 15px 45px rgba(255,204,77,0.45);
}

/* COUPLE */

.preview{

    margin-top:45px;

    padding-top:35px;

    border-top:1px solid rgba(255,204,77,0.12);
}

.preview h3{

    font-family:'Cinzel',serif;

    color:#ffcc4d;

    margin-bottom:20px;

    font-size:26px;
}

.preview p{

    color:#d5d5d5;

    line-height:2.2;

    font-size:15px;
}

.preview span{

    color:#ffcc4d;

    letter-spacing:2px;
}

/* SAVE DATE */

.date{

    margin-top:30px;

    color:#ffcc4d;

    letter-spacing:4px;

    line-height:2;
}

/* MOBILE */

@media(max-width:768px){

    body{
        cursor:auto;
    }

    .cursor{
        display:none;
    }

    .form-card{
        padding:50px 25px;
    }

    h2{
        font-size:34px;
    }

}

/* MUSIC BUTTON */

.music-btn{

    position:fixed;

    top:25px;
    right:25px;

    width:55px;
    height:55px;

    border-radius:50%;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,204,77,0.2);

    backdrop-filter:blur(10px);

    color:#ffcc4d;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;

    cursor:pointer;

    z-index:1000;

    transition:0.4s;
}

.music-btn:hover{

    transform:scale(1.08);

    box-shadow:0 0 25px rgba(255,204,77,0.25);
}

</style>
</head>
<body>

<!-- CURSOR -->

<div class="cursor"></div>

<!-- MUSIC -->

<div class="music-btn" onclick="toggleMusic()">
♫
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=beautiful-piano-ambient-110624.mp3" type="audio/mpeg">
</audio>

<!-- PARTICLES -->

<div class="particle" style="left:10%; animation-delay:0s;"></div>
<div class="particle" style="left:25%; animation-delay:2s;"></div>
<div class="particle" style="left:40%; animation-delay:4s;"></div>
<div class="particle" style="left:55%; animation-delay:1s;"></div>
<div class="particle" style="left:70%; animation-delay:3s;"></div>
<div class="particle" style="left:85%; animation-delay:5s;"></div>

<!-- HERO -->

<div class="hero">

<video autoplay muted loop playsinline class="bg-video">
<source src="https://cdn.coverr.co/videos/coverr-wedding-rings-1561382240346?download=1080p" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="form-card">

    <div class="decor">
        ✦
    </div>

    <div class="top">
        RSVP CONFIRMATION
    </div>

    <h2>
        We Would Be Honored<br>
        By Your Presence
    </h2>

    <p class="desc">

        Kindly let us know how many members<br>
        from your family will attend<br>
        our wedding celebration.

    </p>

    <form action="success.html">

        <div class="input-box">

            <label>
                NUMBER OF GUESTS
            </label>

            <select required>

                <option value="">
                    Select Guests
                </option>

                <option>
                    1 Guest
                </option>

                <option>
                    2 Guests
                </option>

                <option>
                    3 Guests
                </option>

                <option>
                    4 Guests
                </option>

                <option>
                    5 Guests
                </option>

                <option>
                    6+ Guests
                </option>

            </select>

        </div>

        <button type="submit">
            CONFIRM RSVP
        </button>

    </form>

    <div class="preview">

        <h3>
            SHUHAIB & FATHIMA
        </h3>

        <p>

            <span>GROOM</span><br>
            AFZAL BAQAVI SHARAFI

            <br><br>

            <span>BRIDE</span><br>
            AYISHA RANIYAHADIYA

        </p>

        <div class="date">

            SAVE THE DATE<br>
            28 • DECEMBER • 2026

        </div>

    </div>

</div>

</div>

<script>

/* CUSTOM CURSOR */

const cursor = document.querySelector('.cursor');

window.addEventListener('mousemove', e => {

    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';

});

/* MUSIC */

const music = document.getElementById("music");

let playing = false;

function toggleMusic(){

    if(!playing){

        music.play();
        playing = true;

    }else{

        music.pause();
        playing = false;

    }

}

</script>

</body>
</html>
