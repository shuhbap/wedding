<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Wedding Confirmation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:#050505;
    color:white;
}

/* BACKGROUND */

.hero{

    width:100%;
    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.85)),
    url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1800&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

    overflow:hidden;
}

/* GOLD GLOW */

.hero::before{

    content:'';

    position:absolute;

    width:450px;
    height:450px;

    background:#ffcc4d25;

    border-radius:50%;

    top:-150px;
    left:-120px;

    filter:blur(120px);
}

.hero::after{

    content:'';

    position:absolute;

    width:400px;
    height:400px;

    background:#d89b0020;

    border-radius:50%;

    bottom:-140px;
    right:-100px;

    filter:blur(120px);
}

/* FORM CARD */

.form-card{

    width:100%;
    max-width:650px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,204,77,0.15);

    backdrop-filter:blur(20px);

    border-radius:40px;

    padding:65px 45px;

    position:relative;

    text-align:center;

    box-shadow:
    0 0 50px rgba(255,204,77,0.06),
    inset 0 0 30px rgba(255,255,255,0.03);

    animation:fade 1.2s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* BORDER */

.form-card::before{

    content:'';

    position:absolute;

    inset:10px;

    border:1px solid rgba(255,204,77,0.08);

    border-radius:30px;

    pointer-events:none;
}

/* DECOR */

.decor{

    font-size:55px;

    color:#ffcc4d;

    margin-bottom:10px;

    font-family:'Great Vibes',cursive;
}

/* TEXT */

.top{

    color:#ffcc4d;

    letter-spacing:5px;

    font-size:12px;

    margin-bottom:25px;
}

h2{

    font-family:'Cinzel',serif;

    font-size:42px;

    line-height:1.4;

    margin-bottom:15px;
}

.desc{

    color:#d5d5d5;

    line-height:1.9;

    margin-bottom:40px;

    font-size:15px;
}

/* INPUT */

.input-box{
    margin-bottom:28px;
    text-align:left;
}

.input-box label{

    display:block;

    margin-bottom:12px;

    color:#ffcc4d;

    font-size:14px;

    letter-spacing:1px;
}

select{

    width:100%;

    padding:18px;

    border:none;

    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:15px;

    backdrop-filter:blur(10px);
}

select option{
    background:#111;
}

/* BUTTON */

button{

    width:100%;

    padding:18px;

    border:none;

    border-radius:60px;

    background:linear-gradient(135deg,#ffcc4d,#d89b00);

    color:black;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:0.5s;

    margin-top:10px;

    box-shadow:0 10px 30px rgba(255,204,77,0.25);
}

button:hover{

    transform:translateY(-5px);

    box-shadow:0 15px 40px rgba(255,204,77,0.4);
}

/* DATE PREVIEW */

.preview{

    margin-top:35px;

    padding-top:30px;

    border-top:1px solid rgba(255,204,77,0.12);
}

.preview p{

    color:#bdbdbd;

    line-height:2;
}

.preview span{
    color:#ffcc4d;
}

/* MOBILE */

@media(max-width:768px){

    .form-card{
        padding:50px 25px;
    }

    h2{
        font-size:32px;
    }

}

</style>
</head>
<body>

<div class="hero">

    <div class="form-card">

        <div class="decor">
            ✦
        </div>

        <div class="top">
            WEDDING CONFIRMATION
        </div>

        <h2>
            We Would Love<br>
            To Celebrate With You
        </h2>

        <p class="desc">

            Kindly let us know<br>
            how many members from your family<br>
            will attend our wedding celebration.

        </p>

        <form action="success.html">

            <div class="input-box">

                <label>
                    NUMBER OF PERSONS
                </label>

                <select required>

                    <option value="">
                        Select Persons
                    </option>

                    <option>
                        1 Person
                    </option>

                    <option>
                        2 Persons
                    </option>

                    <option>
                        3 Persons
                    </option>

                    <option>
                        4 Persons
                    </option>

                    <option>
                        5 Persons
                    </option>

                    <option>
                        6+ Persons
                    </option>

                </select>

            </div>

            <button type="submit">
                CONTINUE
            </button>

        </form>

        <div class="preview">

            <p>

                <span>GROOM :</span>
                SHUHAIB BAQAVI NABAVI
                <br><br>

                <span>BRIDE :</span>
                FATHIMA NIBA HADIYA

            </p>

        </div>

    </div>

</div>

</body>
</html>
