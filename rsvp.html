<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSVP</title>

<style>
body{
  background:#0a0a0a;
  color:white;
  font-family:Poppins;
  text-align:center;
}

.card{margin-top:100px}

.count{
  font-size:60px;
  margin:20px;
}

.btn{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#d4af37;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="card">
  <h2>How many from your family?</h2>

  <button class="btn" onclick="dec()">-</button>
  <span id="count" class="count">1</span>
  <button class="btn" onclick="inc()">+</button>

  <br>
  <button class="btn" onclick="sendWhatsApp()">Submit</button>
</div>

<script>
let c=1;

function inc(){c++;document.getElementById('count').innerText=c}
function dec(){if(c>1){c--;document.getElementById('count').innerText=c}}

function sendWhatsApp(){
  let number = "919999999999"; // 👉 change to your number
  let msg = "I will attend wedding with "+c+" members";
  window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));
  
  setTimeout(()=>{
    window.location='final.html'
  },1000);
}
</script>

</body>
</html>
