<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:linear-gradient(135deg,#fdfbfb,#ebedee)}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') center/cover no-repeat;
  color:white;
}

.hero h1{font-family:'Great Vibes',cursive;font-size:70px}
.hero p{margin-top:10px;font-size:20px}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#fff;
  color:#333;
  border:none;
  border-radius:30px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{background:#333;color:#fff}

.section{padding:80px 20px;text-align:center}

.card{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.names{font-size:40px;font-family:'Great Vibes',cursive;color:#d4af37}

.question{
  font-size:24px;
  margin-bottom:20px;
}

.btn-group{
  display:flex;
  justify-content:center;
  gap:20px;
}

.footer{padding:20px;text-align:center;background:#333;color:white}
</style>
</head>

<body>

<section class="hero">
  <h1>Arjun & Meera</h1>
  <p>Are Getting Married</p>
  <button class="btn" onclick="scrollToSection()">View Invitation</button>
</section>

<section class="section">
  <div class="card">
    <h2>Wedding Details</h2>
    <p class="names">Arjun ♥ Meera</p>
    <p>April 30, 2026</p>
    <p>Grand Palace Hall, Kerala</p>
  </div>
</section>

<section class="section">
  <div class="card">
    <p class="question">Will you attend our wedding?</p>
    <div class="btn-group">
      <button class="btn" onclick="goRSVP()">Yes, Insha Allah</button>
      <button class="btn" onclick="alert('We will miss you 😔')">No, I can't</button>
    </div>
  </div>
</section>

<section class="footer">
  <p>Made with ❤️ for our special day</p>
</section>

<script>
function scrollToSection(){
  window.scrollTo({top:window.innerHeight,behavior:'smooth'});
}

function goRSVP(){
  window.location.href = "rsvp.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins',sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh}

.card{
  background:white;
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.count-box{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin:20px 0;
}

.count{
  font-size:30px;
}

.btn{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.submit{
  background:#333;
  color:white;
}
</style>
</head>

<body>

<div class="card">
  <h2>How many people from your family?</h2>

  <div class="count-box">
    <button class="btn" onclick="decrease()">-</button>
    <div class="count" id="count">1</div>
    <button class="btn" onclick="increase()">+</button>
  </div>

  <button class="btn submit" onclick="submitRSVP()">Submit</button>
</div>

<script>
let count = 1;

function increase(){
  count++;
  document.getElementById('count').innerText = count;
}

function decrease(){
  if(count>1){
    count--;
    document.getElementById('count').innerText = count;
  }
}

function submitRSVP(){
  alert("Thank you! You registered " + count + " people.");
}
</script>

</body>
</html>
