<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Shuhaib & Fathima Wedding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:#050505;
    color:white;
}

/* PREMIUM BACKGROUND */

.hero{

    width:100%;
    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.72),rgba(0,0,0,0.82)),
    url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1800&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;

    overflow:hidden;
}

/* GOLD GLOW */

.hero::before{
    content:'';
    position:absolute;

    width:500px;
    height:500px;

    background:#ffcc4d20;

    border-radius:50%;

    top:-150px;
    left:-120px;

    filter:blur(120px);
}

.hero::after{
    content:'';
    position:absolute;

    width:450px;
    height:450px;

    background:#d89b0025;

    border-radius:50%;

    bottom:-150px;
    right:-100px;

    filter:blur(120px);
}

/* FLOATING PARTICLES */

.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:#ffcc4d;
    border-radius:50%;
    opacity:0.5;
    animation:float 8s linear infinite;
}

@keyframes float{

    0%{
        transform:translateY(100vh);
        opacity:0;
    }

    10%{
        opacity:0.7;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }

}

/* CARD */

.card{

    width:100%;
    max-width:700px;

    padding:70px 55px;

    border-radius:40px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,204,77,0.18);

    backdrop-filter:blur(20px);

    text-align:center;

    position:relative;

    z-index:2;

    box-shadow:
    0 0 50px rgba(255,204,77,0.06),
    inset 0 0 30px rgba(255,255,255,0.03);

    animation:fade 1.5s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* DECOR */

.decor{

    font-size:50px;
    color:#ffcc4d;
    margin-bottom:15px;
    font-family:'Great Vibes',cursive;
}

/* TEXT */

.top{

    color:#ffcc4d;

    letter-spacing:6px;

    font-size:12px;

    margin-bottom:30px;
}

h1{

    font-family:'Cinzel',serif;

    font-size:68px;

    line-height:1.2;

    font-weight:700;
}

h1 span{
    color:#ffcc4d;
}

.desc{

    margin-top:25px;

    color:#d5d5d5;

    line-height:2;

    font-size:15px;
}

.date{

    margin-top:35px;

    font-size:18px;

    color:#ffcc4d;

    letter-spacing:5px;
}

/* GOLD LINE */

.line{

    width:120px;
    height:1px;

    background:#ffcc4d;

    margin:35px auto;
}

/* QUESTION */

.question{

    font-size:25px;

    font-weight:500;

    margin-bottom:35px;
}

/* BUTTONS */

.buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;
}

.buttons a{

    padding:16px 38px;

    border-radius:60px;

    text-decoration:none;

    font-weight:600;

    transition:0.5s;

    position:relative;

    overflow:hidden;
}

/* YES BUTTON */

.yes{

    background:linear-gradient(135deg,#ffcc4d,#d89b00);

    color:black;

    box-shadow:0 10px 30px rgba(255,204,77,0.3);
}

.yes:hover{

    transform:translateY(-6px) scale(1.03);

    box-shadow:0 15px 40px rgba(255,204,77,0.45);
}

/* NO BUTTON */

.no{

    border:1px solid rgba(255,204,77,0.25);

    color:white;

    background:rgba(255,255,255,0.03);
}

.no:hover{

    background:rgba(255,255,255,0.08);

    transform:translateY(-5px);
}

/* MOBILE */

@media(max-width:768px){

    .card{
        padding:50px 25px;
    }

    h1{
        font-size:42px;
    }

    .question{
        font-size:18px;
    }

    .buttons{
        flex-direction:column;
    }

    .buttons a{
        width:100%;
    }

}

/* EXTRA PREMIUM GOLD BORDER */

.card::before{

    content:'';

    position:absolute;

    inset:10px;

    border:1px solid rgba(255,204,77,0.08);

    border-radius:32px;

    pointer-events:none;
}

</style>
</head>
<body>

<!-- PARTICLES -->

<div class="particle" style="left:10%; animation-delay:0s;"></div>
<div class="particle" style="left:20%; animation-delay:2s;"></div>
<div class="particle" style="left:35%; animation-delay:4s;"></div>
<div class="particle" style="left:50%; animation-delay:1s;"></div>
<div class="particle" style="left:65%; animation-delay:3s;"></div>
<div class="particle" style="left:80%; animation-delay:5s;"></div>

<!-- MAIN -->

<div class="hero">

    <div class="card">

        <div class="decor">
            ✦
        </div>

        <p class="top">
            WEDDING INVITATION
        </p>

        <h1>
            SHUHAIB <span>&</span><br>
            FATHIMA
        </h1>

        <p class="desc">

            Together with our families,<br>
            we joyfully invite you to celebrate<br>
            the beginning of our forever journey.

        </p>

        <div class="date">
            28 • DECEMBER • 2026
        </div>

        <div class="line"></div>

        <div class="question">
            Will You Attend Our Wedding?
        </div>

        <div class="buttons">

            <a href="attend.html" class="yes">
                YES, INSHA ALLAH
            </a>

            <a href="sorry.html" class="no">
                NO
            </a>

        </div>

    </div>

</div>

</body>
</html>
