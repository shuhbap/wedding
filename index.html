<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Afzal & Ayisha Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Poppins;
  text-align:center;
  overflow-x:hidden;
}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
  url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
  animation:fade 2s ease;
}

h1{
  font-family:Great Vibes;
  font-size:80px;
  color:#d4af37;
}

.gold{color:#d4af37}

.btn{
  padding:15px 30px;
  margin:10px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#d4af37,#f5e6a3);
  color:black;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px #d4af37;
}

.box{
  display:inline-block;
  padding:10px;
  margin:5px;
  background:#000;
  border-radius:10px;
}

@keyframes fade{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav">
</audio>

<div class="hero">
  <h1>Afzal & Ayisha</h1>
  <p>Groom: <span class="gold">AFZAL BAQAVI</span></p>
  <p>Bride: <span class="gold">AYISHA HADIYA</span></p>
  <button class="btn" onclick="scrollDown()">Open Invitation</button>
</div>

<div style="padding:40px">
  <h2 class="gold">Wedding Details</h2>
  <p>Date: 11/10/2026</p>
  <p>Place: Perumbilav</p>
  <p>Auditorium: Soon</p>

  <div id="countdown"></div>

  <h2>Will you attend?</h2>
  <button class="btn" onclick="go()">Yes, Insha Allah</button>
  <button class="btn" onclick="alert('We will miss you ❤️')">No, I can't</button>
</div>

<script>
function scrollDown(){
  window.scrollTo({top:window.innerHeight,behavior:'smooth'})
}

function go(){
  window.location='rsvp.html'
}

let d=new Date("Oct 11, 2026").getTime();
setInterval(()=>{
let n=new Date().getTime();
let diff=d-n;
let days=Math.floor(diff/(1000*60*60*24));
document.getElementById("countdown").innerHTML="<div class='box'>"+days+" days left</div>";
},1000);
</script>

</body>
</html>
